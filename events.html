<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名 | 藝境空間</title>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .event-detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }
        @media (max-width: 768px) {
            .event-detail-container {
                grid-template-columns: 1fr;
            }
        }
        .event-hero-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .event-meta {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .event-meta p {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }
        .event-meta i {
            color: var(--accent);
            font-style: normal;
        }
        /* 從 app.js 偷過來的 theme 設定，為了一致性 */
    </style>
</head>

<body>
    <nav class="glass-header">
        <div class="logo">藝境<span>活動報名</span></div>
        <ul class="nav-links">
            <li><a href="index.html">返回首頁</a></li>
        </ul>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="btn-secondary" id="themeToggleTheme" style="padding: 10px; line-height: 1; min-width: 45px;">🌙</button>
        </div>
    </nav>

    <main style="padding-top: 120px; min-height: 80vh;">
        <div id="loadingIndicator" style="text-align: center; padding: 100px;">
            <h2 style="color: var(--accent);">載入活動資訊中...</h2>
        </div>
        
        <div id="eventContent" style="display: none;">
            <h1 id="eventTitle" style="font-family: var(--font-heading); font-size: 2.5rem; margin-bottom: 10px;">活動名稱</h1>
            
            <div class="event-detail-container">
                <!-- 左側活動資訊 -->
                <div>
                    <img id="eventImage" src="assets/opera_hero_bg.png" alt="活動主視覺" class="event-hero-img">
                    
                    <div style="margin-top: 30px;">
                        <h3 style="color: var(--accent); margin-bottom: 15px; font-size: 1.5rem;">活動詳情</h3>
                        <p id="eventDescription" style="line-height: 1.8; white-space: pre-wrap; color: var(--text-main);"></p>
                    </div>
                </div>

                <!-- 右側報名表單 -->
                <div>
                    <div class="event-meta">
                        <p><i>📅</i> <span id="eventDateDisplay">日期</span></p>
                        <p><i>📍</i> <span id="eventLocationDisplay">地點</span></p>
                        <p><i>👥</i> 報名狀況：<span id="eventCapacityDisplay" style="font-weight: bold; color: var(--accent); font-size: 1.2rem;">32 / 50</span> 人</p>
                    </div>

                    <div class="glass-card">
                        <h3 style="margin-bottom: 20px; color: var(--accent); font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;">觀眾報名表</h3>
                        <div id="registrationClosedMsg" style="display: none; padding: 20px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 8px; color: #ef4444; text-align: center; margin-bottom: 20px;">
                            此活動目前未開放報名或人數已額滿。
                        </div>

                        <form id="eventRegistrationForm">
                            <div class="form-group">
                                <label for="regName">真實姓名</label>
                                <input type="text" id="regName" placeholder="請輸入姓名，以便現場核對" required>
                            </div>
                            <div class="form-group">
                                <label for="regPhone">聯絡電話</label>
                                <input type="tel" id="regPhone" placeholder="請輸入可聯繫之手機號碼" required>
                            </div>
                            <div class="form-group">
                                <label for="regEmail">聯絡信箱</label>
                                <input type="email" id="regEmail" placeholder="系統將寄送報名成功通知信至此" required>
                            </div>

                            <!-- 動態生成額外填寫欄位 -->
                            <div id="dynamicFieldsContainer"></div>
                            <button type="submit" class="btn-primary" id="regSubmitBtn" style="width: 100%; font-size: 1.1rem; padding: 15px; margin-top: 10px;">確認報名</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div id="errorIndicator" style="display: none; text-align: center; padding: 100px;">
            <h2 style="color: #ef4444;">找不到此活動，或活動已下架。</h2>
            <br>
            <a href="index.html" class="btn-primary">回首頁</a>
        </div>
    </main>

    <footer class="glass-footer" style="text-align: center; padding: 20px; margin-top: 40px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--glass-border);">
        <p>&copy; 2026 藝境空間 版權所有 | 專業排練場地租賃</p>
    </footer>

    <!-- 報名成功 Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content glass-card" style="text-align: center;">
            <span class="close-modal" onclick="window.location.href='index.html'">&times;</span>
            <div style="font-size: 4rem; margin-bottom: 20px;">🎉</div>
            <h3 id="successModalTitle" style="color: var(--accent); margin-bottom: 15px; font-size: 1.8rem;">報名成功！</h3>
            <p id="successModalDesc" style="margin-bottom: 20px; line-height: 1.6;">感謝您的參與，詳細資訊與報名序號已登錄。<br>活動時請憑報名時留存之姓名及聯繫方式現場核對報到。</p>
            <button class="btn-primary" onclick="window.location.href='index.html'" style="width: 100%;">回到首頁</button>
        </div>
    </div>

    <script src="events.js?v=2"></script>
</body>

</html>
